<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Closing Checklist</title>
  <meta property="og:title" content="Closing Checklist" />
  <meta property="og:description" content="Paris Baguette · End of Shift" />
  <meta property="og:image" content="https://viriescence.github.io/closing-checklist/preview.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://viriescence.github.io/closing-checklist/preview.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="light"] {
      --bg-body: #f0ede8;
      --bg-primary: #ffffff;
      --bg-secondary: #ebe8e3;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --text-tertiary: #a0a09a;
      --border-light: rgba(0,0,0,0.1);
      --border-med: rgba(0,0,0,0.18);
      --checkbox-bg: #f5f3ef;
      --checkbox-border: rgba(0,0,0,0.25);
      --green: #1D9E75;
      --tag-display-bg: #E6F1FB; --tag-display-text: #0C447C;
      --tag-drink-bg: #E1F5EE;   --tag-drink-text: #085041;
      --tag-pastry-bg: #FAEEDA;  --tag-pastry-text: #633806;
      --tag-cleaning-bg: #EEEDFE;--tag-cleaning-text: #3C3489;
      --tag-close-bg: #FCEBEB;   --tag-close-text: #791F1F;
      --red-bg: #FCEBEB; --red-text: #791F1F; --red-border: #F09595; --red-hover-text: #A32D2D;
      --toggle-bg: #d0cdc8; --toggle-knob: #ffffff; --toggle-active: #1D9E75;
      --sticky-bg: rgba(240,237,232,0.92);
    }

    [data-theme="dark"] {
      --bg-body: #0d1a3a;
      --bg-primary: #1a2d5a;
      --bg-secondary: #152244;
      --text-primary: #f0f4ff;
      --text-secondary: #a8b8d8;
      --text-tertiary: #6a7fa0;
      --border-light: rgba(255,255,255,0.1);
      --border-med: rgba(255,255,255,0.18);
      --checkbox-bg: #0d1a3a;
      --checkbox-border: rgba(255,255,255,0.3);
      --green: #4db88a;
      --tag-display-bg: rgba(30,51,102,0.9);  --tag-display-text: #8fb3e8;
      --tag-drink-bg: rgba(77,184,138,0.15);  --tag-drink-text: #7dd4aa;
      --tag-pastry-bg: rgba(200,169,110,0.15);--tag-pastry-text: #e2c98a;
      --tag-cleaning-bg: rgba(80,60,130,0.2); --tag-cleaning-text: #b8a8e8;
      --tag-close-bg: rgba(180,60,60,0.12);   --tag-close-text: #f4a0a0;
      --red-bg: rgba(220,80,80,0.12); --red-text: #f4a0a0; --red-border: rgba(220,80,80,0.3); --red-hover-text: #f4a0a0;
      --toggle-bg: #243d78; --toggle-knob: #8fb3e8; --toggle-active: #4db88a;
      --sticky-bg: rgba(13,26,58,0.92);
    }

    html { transition: background 0.25s; }

    *, *::before, *::after {
      transition: background-color 0.25s, border-color 0.25s, color 0.25s;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1.25rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.25rem;
    }
    h1 { font-size: 22px; font-weight: 500; }
    .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.5; }

    .theme-toggle {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .theme-label { font-size: 12px; color: var(--text-tertiary); }
    .toggle-track {
      width: 40px; height: 22px; border-radius: 99px;
      background: var(--toggle-bg);
      border: 0.5px solid var(--border-med);
      position: relative;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle-track.active { background: var(--toggle-active); }
    .toggle-knob {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--toggle-knob);
      transition: transform 0.25s, background 0.25s;
    }
    .toggle-track.active .toggle-knob { transform: translateX(18px); }

    .progress-bar-wrap {
      margin-bottom: 1.75rem; padding: 14px 16px;
      background: var(--bg-primary); border-radius: 12px;
      border: 0.5px solid var(--border-light);
      transition: background 0.25s;
    }
    .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .progress-label { font-size: 13px; color: var(--text-secondary); }
    .progress-count { font-size: 13px; font-weight: 500; }
    .bar-track { height: 5px; border-radius: 99px; background: var(--border-light); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.3s ease; }

    .sticky-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--sticky-bg);
      border-bottom: 0.5px solid var(--border-light);
      padding: 10px 1.25rem;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .sticky-bar.visible { transform: translateY(0); }
    .sticky-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
    .sticky-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .sticky-track { flex: 1; height: 4px; border-radius: 99px; background: var(--border-light); overflow: hidden; }
    .sticky-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.3s ease; }
    .sticky-count { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; }

    .block { margin-bottom: 1.5rem; }
    .time-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .time-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.04em; white-space: nowrap; }
    .time-line { flex: 1; min-width: 16px; height: 0.5px; background: var(--border-light); }
    .section-tag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
    .tag-display  { background: var(--tag-display-bg);  color: var(--tag-display-text); }
    .tag-drink    { background: var(--tag-drink-bg);    color: var(--tag-drink-text); }
    .tag-pastry   { background: var(--tag-pastry-bg);   color: var(--tag-pastry-text); }
    .tag-cleaning { background: var(--tag-cleaning-bg); color: var(--tag-cleaning-text); }
    .tag-close    { background: var(--tag-close-bg);    color: var(--tag-close-text); }

    .items { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; margin-bottom: 8px; }

    .item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
      background: var(--bg-primary); border-radius: 8px;
      border: 0.5px solid var(--border-light);
      cursor: pointer; transition: background 0.15s, opacity 0.2s;
      user-select: none; -webkit-tap-highlight-color: transparent; min-height: 44px;
    }
    .item:hover { background: var(--bg-secondary); }
    .item.done { opacity: 0.45; }
    .item.done .item-text { text-decoration: line-through; }
    .item.custom-item { border-style: dashed; }

    .checkbox {
      width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
      border-radius: 5px; border: 0.5px solid var(--checkbox-border);
      background: var(--checkbox-bg);
      display: flex; align-items: center; justify-content: center;
    }
    .item.done .checkbox { background: var(--green) !important; border-color: var(--green) !important; }
    .item:not(.done) .checkbox { background: var(--checkbox-bg) !important; border-color: var(--checkbox-border) !important; }
    .check-svg { display: none; }
    .item.done .check-svg { display: block; }

    .item-text { font-size: 13.5px; color: var(--text-primary); line-height: 1.4; flex: 1; }
    .note { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; }

    .remove-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); opacity: 0;
      transition: opacity 0.15s, color 0.15s; flex-shrink: 0;
      min-width: 24px; min-height: 24px;
    }
    .item:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { color: #E24B4A; }

    .add-row { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
    .add-input {
      flex: 1; font-size: 14px; padding: 8px 12px;
      border-radius: 8px; border: 0.5px dashed var(--border-med);
      background: var(--bg-primary); color: var(--text-primary);
      outline: none; height: 40px; font-family: inherit; -webkit-appearance: none;
      transition: background 0.25s, color 0.25s;
    }
    .add-input:focus { border-color: var(--green); border-style: solid; }
    .add-input::placeholder { color: var(--text-tertiary); }

    .add-btn {
      height: 40px; padding: 0 14px; font-size: 13px; font-family: inherit;
      border-radius: 8px; border: 0.5px solid var(--border-med);
      background: transparent; color: var(--text-secondary);
      cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .add-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .add-btn:active { opacity: 0.7; }

    .bottom-actions { display: flex; gap: 8px; margin-top: 2rem; justify-content: center; flex-wrap: wrap; }
    .action-btn {
      padding: 10px 20px; font-size: 13px; font-family: inherit;
      color: var(--text-secondary); background: transparent;
      border: 0.5px solid var(--border-med); border-radius: 8px;
      cursor: pointer; min-height: 44px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:hover { background: var(--bg-primary); }
    .action-btn.danger:hover { color: var(--red-hover-text); border-color: var(--red-border); background: var(--red-bg); }
    .action-btn:active { opacity: 0.7; }

    @media (max-width: 480px) {
      body { padding: 1.25rem 1rem; }
      h1 { font-size: 20px; }
      .items { grid-template-columns: 1fr; }
      .add-input { font-size: 16px; }
      .bottom-actions { flex-direction: column; align-items: stretch; }
      .action-btn { text-align: center; }
      .time-header { gap: 6px; }
    }
    @media (min-width: 481px) and (max-width: 640px) {
      .items { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="sticky-bar" id="sticky-bar">
    <div class="sticky-inner">
      <span class="sticky-label">Progress</span>
      <div class="sticky-track"><div class="sticky-fill" id="sticky-fill" style="width:0%"></div></div>
      <span class="sticky-count" id="sticky-count">0 / 0</span>
    </div>
  </div>
  <div class="container">
    <div class="top-bar">
      <h1>Closing Checklist</h1>
      <div class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <span class="theme-label" id="theme-label">Dark</span>
        <div class="toggle-track active" id="toggle-track">
          <div class="toggle-knob"></div>
        </div>
      </div>
    </div>
    <p class="subtitle">Tap items to mark complete. Add custom tasks to any time block. Progress resets on page refresh.</p>
    <div class="progress-bar-wrap">
      <div class="progress-top">
        <span class="progress-label">Closing progress</span>
        <span class="progress-count" id="prog-count">0 / 0</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="prog-bar" style="width:0%"></div></div>
    </div>
    <div id="list"></div>
    <div class="bottom-actions">
      <button class="action-btn danger" onclick="resetAll()">Reset checklist</button>
      <button class="action-btn danger" onclick="clearCustom()">Clear custom entries</button>
    </div>
  </div>

  <script>
    const sections = [
      { time: "5:30 PM", tag: "display", tagLabel: "Display & Supplies", items: [
        { text: "Restock candles" },
        { text: "Put away cake slicers" },
        { text: "Restock catering boxes, wax paper, paper plates, drink carriers" },
        { text: "Prep drink batches if needed" },
        { text: "Restock jams, chocolate bars, novelty items" },
        { text: "Change water in tong and rag buckets" },
        { text: "Pack away extra or expired packaged breads" },
      ]},
      { time: "6:00 PM", tag: "drink", tagLabel: "Drinks & Smallwares", items: [
        { text: "Pull macarons" },
        { text: "Restock to-go bags, boxes, paper bags" },
        { text: "Restock coffee beans" },
        { text: "Restock hot drink sleeves + toppings", note: "Khafi, fruity pebbles, custard powders" },
        { text: "Restock cups, lids, sugars, straws, utensils" },
        { text: "Wash dishes", note: "Milk frothing cups, blenders" },
      ]},
      { time: "6:30 PM", tag: "pastry", tagLabel: "Pastry & Fridges", items: [
        { text: "Condense pastry display" },
        { text: "Clean drink dispenser" },
        { text: "Restock cake boxes" },
        { text: "Restock grab & go" },
        { text: "Restock milks in fridge" },
        { text: "Restock frozen items" },
        { text: "Restock chips" },
      ]},
      { time: "7:30 PM", tag: "cleaning", tagLabel: "Deep Clean — Round 1", items: [
        { text: "Pull and wrap remaining cake slices" },
        { text: "Clean trays and tongs" },
        { text: "Restock chai, matcha, coco powder" },
        { text: "Restock syrups", note: "Caramel, mocha, vanilla, simple syrup, seasonal" },
        { text: "Clean bathrooms" },
        { text: "Wash large pastry pans" },
        { text: "Pull empty trays, wipe, and reline with wax paper" },
      ]},
      { time: "8:00 PM", tag: "cleaning", tagLabel: "Deep Clean — Round 2", items: [
        { text: "Pack donation bags" },
        { text: "Wipe down display cases" },
        { text: "Wash milk jugs", note: "Half & half, skim milk" },
        { text: "Check and replace trash bags" },
        { text: "Check patio" },
      ]},
      { time: "8:30 PM", tag: "cleaning", tagLabel: "Deep Clean — Round 3", items: [
        { text: "Wipe down all tables including corner tables" },
        { text: "Sweep floors" },
        { text: "Turn off oven" },
        { text: "Wash tongs and oven utensils" },
        { text: "Count waste pastries" },
        { text: "Wash powder spoons" },
        { text: "Fill water cups for fridge" },
      ]},
      { time: "8:55 PM", tag: "close", tagLabel: "Close Out", items: [
        { text: "Turn off espresso machine" },
        { text: "Close register" },
      ]},
    ];

    const tagClass = { display:"tag-display", drink:"tag-drink", pastry:"tag-pastry", cleaning:"tag-cleaning", close:"tag-close" };
    let customItems = sections.map(() => []);
    let checkedState = {};
    let isDark = true;

    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
      document.getElementById("theme-label").textContent = isDark ? "Dark" : "Light";
      const track = document.getElementById("toggle-track");
      track.classList.toggle("active", isDark);
    }

    function itemKey(si, ii, custom) { return (custom ? 'c' : 's') + si + '-' + ii; }

    function updateProgress() {
      let total = 0, done = 0;
      sections.forEach((sec, si) => {
        sec.items.forEach((_, ii) => { total++; if (checkedState[itemKey(si,ii,false)]) done++; });
        customItems[si].forEach((_, ii) => { total++; if (checkedState[itemKey(si,ii,true)]) done++; });
      });
      document.getElementById("prog-count").textContent = done + " / " + total;
      const pct = (total ? Math.round(done/total*100) : 0) + "%";
      document.getElementById("prog-bar").style.width = pct;
      document.getElementById("sticky-fill").style.width = pct;
      document.getElementById("sticky-count").textContent = done + " / " + total;
    }

    function makeCheckbox() {
      const cb = document.createElement("div");
      cb.className = "checkbox";
      cb.innerHTML = '<svg class="check-svg" width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      return cb;
    }

    function makeItem(text, note, key, custom, onRemove) {
      const div = document.createElement("div");
      div.className = "item" + (custom ? " custom-item" : "");
      if (checkedState[key]) div.classList.add("done");

      const cb = makeCheckbox();
      const textWrap = document.createElement("div");
      textWrap.style.flex = "1";
      const textEl = document.createElement("div");
      textEl.className = "item-text";
      textEl.textContent = text;
      textWrap.appendChild(textEl);
      if (note) {
        const noteEl = document.createElement("div");
        noteEl.className = "note";
        noteEl.textContent = note;
        textWrap.appendChild(noteEl);
      }

      div.appendChild(cb);
      div.appendChild(textWrap);

      if (custom && onRemove) {
        const rmBtn = document.createElement("button");
        rmBtn.className = "remove-btn";
        rmBtn.title = "Remove entry";
        rmBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        rmBtn.addEventListener("click", e => { e.stopPropagation(); onRemove(); });
        div.appendChild(rmBtn);
      }

      div.addEventListener("click", () => {
        checkedState[key] = !checkedState[key];
        div.classList.toggle("done", checkedState[key]);
        updateProgress();
      });

      return div;
    }

    function renderSection(si) {
      const block = document.getElementById("block-" + si);
      const grid = block.querySelector(".items");
      grid.innerHTML = "";
      sections[si].items.forEach((item, ii) => {
        grid.appendChild(makeItem(item.text, item.note || null, itemKey(si,ii,false), false, null));
      });
      customItems[si].forEach((item, ii) => {
        grid.appendChild(makeItem(item.text, null, itemKey(si,ii,true), true, () => {
          delete checkedState[itemKey(si,ii,true)];
          customItems[si].splice(ii, 1);
          renderSection(si);
          updateProgress();
        }));
      });
      updateProgress();
    }

    function render() {
      const list = document.getElementById("list");
      list.innerHTML = "";
      sections.forEach((sec, si) => {
        const block = document.createElement("div");
        block.className = "block";
        block.id = "block-" + si;
        const header = document.createElement("div");
        header.className = "time-header";
        header.innerHTML =
          '<span class="time-label">' + sec.time + '</span>' +
          '<div class="time-line"></div>' +
          '<span class="section-tag ' + tagClass[sec.tag] + '">' + sec.tagLabel + '</span>';
        block.appendChild(header);
        const grid = document.createElement("div");
        grid.className = "items";
        block.appendChild(grid);
        const addRow = document.createElement("div");
        addRow.className = "add-row";
        const input = document.createElement("input");
        input.type = "text";
        input.className = "add-input";
        input.placeholder = "Add a task to " + sec.time + "...";
        input.maxLength = 80;
        const btn = document.createElement("button");
        btn.className = "add-btn";
        btn.textContent = "+ Add";
        const addEntry = () => {
          const val = input.value.trim();
          if (!val) return;
          customItems[si].push({ text: val });
          input.value = "";
          renderSection(si);
        };
        btn.addEventListener("click", addEntry);
        input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); addEntry(); } });
        addRow.appendChild(input);
        addRow.appendChild(btn);
        block.appendChild(addRow);
        list.appendChild(block);
        renderSection(si);
      });
      updateProgress();
    }

    function resetAll() {
      checkedState = {};
      document.querySelectorAll(".item").forEach(el => el.classList.remove("done"));
      updateProgress();
    }

    function clearCustom() {
      customItems = sections.map(() => []);
      Object.keys(checkedState).filter(k => k.startsWith("c")).forEach(k => delete checkedState[k]);
      sections.forEach((_, si) => renderSection(si));
      updateProgress();
    }

    const progressWrap = document.querySelector(".progress-bar-wrap");
    const stickyBar = document.getElementById("sticky-bar");
    window.addEventListener("scroll", () => {
      const bottom = progressWrap.getBoundingClientRect().bottom;
      stickyBar.classList.toggle("visible", bottom < 0);
    }, { passive: true });

    render();
  </script>
</body>
</html>
